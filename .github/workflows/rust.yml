name: Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        toolchain:
          - stable

    steps:
    - name: Update apt repositories
      run: sudo apt update
    - name: Install system dependencies
      run: sudo apt install mold libwayland-dev libxkbcommon-dev g++ pkg-config libx11-dev libasound2-dev libudev-dev libxkbcommon-x11-0
    - run: rustup update ${{ matrix.toolchain }} && rustup default ${{ matrix.toolchain }}
    - uses: actions/checkout@v4
    - name: Build
      run: cargo build --verbose
