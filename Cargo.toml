[workspace]
members = ["crates/client", "crates/game_core", "crates/server", "crates/shared"]
resolver = "3"

# Enable a small amount of optimization in the dev profile.
[profile.dev]
opt-level = 1

# Enable a large amount of optimization in the dev profile for dependencies.
[profile.dev.package."*"]
opt-level = 3

# [patch.crates-io]
# lightyear = { path = "../lightyear/lightyear/" }

# Shared dependencies, used in both client and server crate
[workspace.dependencies]
avian3d = "0.5.0"
async-compat = "0.2.5"
rand = "0.9.2"
tokio = { version = "1.49.0", features = ["net", "io-util"] }
shared = { version = "0.1.0", path = "./crates/shared" }
serde_json = "1.0.145"
bevy = "0.18.0"
lightyear = { version = "0.26.0", features = ["client", "netcode", "replication", "udp", "avian3d", "trace", "std", "server"]}
