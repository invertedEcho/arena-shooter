[package]
name = "fun-shooter"
version = "0.1.0"
edition = "2024"

# Enable a small amount of optimization in the dev profile.
[profile.dev]
opt-level = 1

# Enable a large amount of optimization in the dev profile for dependencies.
[profile.dev.package."*"]
opt-level = 3

[dependencies]
avian3d = "0.4.1"
avian_rerecast = "0.3.0"
bevy = { version = "0.17.2", features = ["mp3", "file_watcher", "wayland", "dynamic_linking", "experimental_bevy_ui_widgets", "track_location"] }
bevy-inspector-egui = "0.34"
bevy_hanabi = "0.17"
bevy_landmass = "0.10.0"
bevy_rerecast = "0.3.0"
bevy_rich_text3d = "0.5.1"
bevy_skein = "0.3"
dirs = "6.0.0"
landmass_rerecast = "0.1.0"
rand = "0.9.2"
serde = "1.0.228"
serde_json = "1.0.145"

