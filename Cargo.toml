[package]
name = "fun-shooter"
version = "0.1.0"
edition = "2024"

# Enable a small amount of optimization in the dev profile.
[profile.dev]
opt-level = 1

# Enable a large amount of optimization in the dev profile for dependencies.
[profile.dev.package."*"]
opt-level = 3

[dependencies]
avian3d = "0.3.1"
bevy = { version = "0.16.1", features = ["mp3", "file_watcher", "wayland", "dynamic_linking"] }
bevy-inspector-egui = "0.33.1"
bevy_hanabi = "0.16.0"
bevy_skein = "0.2.1"
rand = "0.9.2"
vleue_navigator = "0.13.0"
